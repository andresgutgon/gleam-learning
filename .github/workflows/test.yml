name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  POSTGRES_USER: gleam_learning_user
  POSTGRES_PASSWORD: secret
  POSTGRES_DB: gleam_learning_test

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: ${{ env.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ env.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ env.POSTGRES_DB }}
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Set up Erlang and Gleam
        uses: erlef/setup-beam@v1
        with:
          otp-version: "27.0"
          gleam-version: "1.16.0"
          rebar3-version: "3"

      - name: Enable pg_trgm extension
        run: |
          PGPASSWORD=${{ env.POSTGRES_PASSWORD }} psql -h localhost -U ${{ env.POSTGRES_USER }} -d ${{ env.POSTGRES_DB }} -c "CREATE EXTENSION IF NOT EXISTS pg_trgm;"

      - name: Cache Gleam dependencies
        uses: actions/cache@v4
        with:
          path: |
            apps/server/build/packages
            ~/.cache/gleam
          key: ${{ runner.os }}-gleam-deps-${{ hashFiles('**/manifest.toml') }}
          restore-keys: |
            ${{ runner.os }}-gleam-deps-

      - name: Download dependencies
        working-directory: apps/server
        run: gleam deps download
        env:
          DATABASE_URL: postgres://${{ env.POSTGRES_USER }}:${{ env.POSTGRES_PASSWORD }}@localhost:5432/${{ env.POSTGRES_DB }}

      - name: Run migrations
        working-directory: apps/server
        run: gleam run -m cigogne -- all
        env:
          DATABASE_URL: postgres://${{ env.POSTGRES_USER }}:${{ env.POSTGRES_PASSWORD }}@localhost:5432/${{ env.POSTGRES_DB }}

      - name: Run tests
        working-directory: apps/server
        run: gleam test
        env:
          DATABASE_URL: postgres://${{ env.POSTGRES_USER }}:${{ env.POSTGRES_PASSWORD }}@localhost:5432/${{ env.POSTGRES_DB }}

      - name: Check formatting
        working-directory: apps/server
        run: gleam format --check src dev test

  client-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Erlang and Gleam
        uses: erlef/setup-beam@v1
        with:
          otp-version: "27.0"
          elixir-version: "1.18.0"
          gleam-version: "1.16.0"
          rebar3-version: "3"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Cache Gleam dependencies
        uses: actions/cache@v4
        with:
          path: |
            apps/client/build/packages
            ~/.cache/gleam
          key: ${{ runner.os }}-gleam-client-deps-${{ hashFiles('apps/client/manifest.toml') }}
          restore-keys: |
            ${{ runner.os }}-gleam-client-deps-

      - name: Download dependencies
        working-directory: apps/client
        run: gleam deps download

      - name: Run tests
        working-directory: apps/client
        run: gleam test

      - name: Check formatting
        working-directory: apps/client
        run: gleam format --check src test
