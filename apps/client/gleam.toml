name = "client"
version = "1.0.0"
target = "javascript"

[dependencies]
shared = { path = "../shared" }
gleam_stdlib = ">= 1.0.0 and < 2.0.0"
lustre = ">= 5.6.0 and < 6.0.0"
gleam_fetch = ">= 1.4.0 and < 2.0.0"
gleam_http = ">= 4.3.0 and < 5.0.0"
gleam_javascript = ">= 1.0.0 and < 2.0.0"
gleam_json = ">= 3.1.0 and < 4.0.0"
modem = ">= 2.1.3 and < 3.0.0"
gleam_time = ">= 1.8.0 and < 2.0.0"
gva = ">= 1.3.0 and < 2.0.0"
glailwind_merge = ">= 1.1.0 and < 2.0.0"
virtual_list = { path = "../../../gleam/virtual_list" }
gquery = ">= 0.1.1 and < 1.0.0"

[dev_dependencies]
gleeunit = ">= 1.0.0 and < 2.0.0"
lustre_dev_tools = ">= 2.3.6 and < 3.0.0"

[tools.lustre.html]
title = "Gleam CRM"
meta = [
  { name = "viewport", content = "width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover" },
]

[[tools.lustre.html.links]]
rel = "icon"
href = "/logo.svg"
type = "image/svg+xml"

[[tools.lustre.html.links]]
rel = "stylesheet"
href = "https://fonts.googleapis.com/css2?family=Lexend:wght@100..900&display=swap"

[tools.lustre.bin]
bun = "system"
tailwindcss = "./node_modules/.bin/tailwindcss"

[tools.lustre.dev]
proxy = { from = "/api", to = "http://localhost:8000/api" }

[tools.lustre.build]
minify = true
