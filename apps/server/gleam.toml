name = "crm"
version = "1.0.0"

[[applications]]
  name = "crm_server"
  module = "crm" # Main entry point is src/crm.gleam

[dependencies]
gleam_stdlib = ">= 1.0.0 and < 2.0.0"
crm_shared = { path = "../shared" }
wisp = ">= 2.2.2 and < 3.0.0"
mist = ">= 6.0.3 and < 7.0.0"
gleam_erlang = ">= 1.3.0 and < 2.0.0"
gleam_http = ">= 4.3.0 and < 5.0.0"
squirrel = ">= 4.6.0 and < 5.0.0"
pog = ">= 4.1.0 and < 5.0.0"
gleam_time = ">= 1.8.0 and < 2.0.0"
envoy = ">= 1.2.0 and < 2.0.0"
gleam_otp = ">= 1.2.0 and < 2.0.0"
simplifile = ">= 2.4.0 and < 3.0.0"

[dev-dependencies]
gleeunit = ">= 1.0.0 and < 2.0.0"
cigogne = ">= 5.0.6 and < 6.0.0"
blah = ">= 1.4.0 and < 2.0.0"
